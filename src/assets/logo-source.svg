<!--
  마진가(Myjinga) 로고 원본 소스
  - 용도: 브랜드 로고 원본 보관용
  - 사용처: public/logo.svg (배포용 복사본)
  - 수정 시 이 파일을 기준으로 편집 후 public/logo.svg에 반영
-->
<svg width="200" height="200" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 그라데이션 정의 -->
    <defs>
        <linearGradient id="brand-grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop stop-color="#22c55e"/> <!-- Tailwind brand-500 -->
            <stop offset="1" stop-color="#15803d"/> <!-- Tailwind brand-700 -->
        </linearGradient>
    </defs>

    <!-- 외부 배경 (rounded-xl) -->
    <rect width="40" height="40" rx="12" fill="url(#brand-grad)"/>

    <!-- 내부 반투명 테두리 (border-2 border-white/80) -->
    <rect x="3" y="3" width="34" height="34" rx="9" stroke="white" stroke-opacity="0.8" stroke-width="2"/>

    <!-- 나침반 아이콘 (Lucide Compass) -->
    <svg x="10" y="10" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <polygon points="16.24,7.76 14.12,14.12 7.76,16.24 9.88,9.88"></polygon>
    </svg>
</svg>
