runConfig:
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 2

env:
  # Public (build-time, embedded in client bundle)
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
    secret: NEXT_PUBLIC_FIREBASE_API_KEY

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME
    secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD
      - RUNTIME
    secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME
    secret: NEXT_PUBLIC_FIREBASE_APP_ID

  # Server-side secrets (runtime only)
  - variable: FIREBASE_ADMIN_PROJECT_ID
    availability:
      - RUNTIME
    secret: FIREBASE_ADMIN_PROJECT_ID

  - variable: FIREBASE_ADMIN_CLIENT_EMAIL
    availability:
      - RUNTIME
    secret: FIREBASE_ADMIN_CLIENT_EMAIL

  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    availability:
      - RUNTIME
    secret: FIREBASE_ADMIN_PRIVATE_KEY

  - variable: FIRESTORE_DATABASE_ID
    availability:
      - RUNTIME
    secret: FIRESTORE_DATABASE_ID

  - variable: CAREERNET_API_KEY
    availability:
      - RUNTIME
    secret: CAREERNET_API_KEY

  - variable: NEIS_API_KEY
    availability:
      - RUNTIME
    secret: NEIS_API_KEY

  - variable: DATA_GO_KR_API_KEY
    availability:
      - RUNTIME
    secret: DATA_GO_KR_API_KEY
